<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hameçons Kamasan — Commande</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --surface: #ffffff; --border: #ddd6c8;
  --accent: #5a3a8a; --accent2: #7a5aaa;
  --text: #252318; --muted: #8a8272; --cart-bg: #f0ecf8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.2em; color:var(--text); text-transform:uppercase; }
.header-sub { font-size:11px; color:var(--muted); letter-spacing:.1em; }

.layout { display:grid; grid-template-columns:1fr 300px; height:calc(100vh - 52px); }
.grid-panel { overflow:auto; padding:24px; }
.grid-title { font-size:11px; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }

.fab-cart { display:none; position:fixed; bottom:20px; right:20px; z-index:200; background:var(--accent); color:#fff; border:none; border-radius:30px; padding:13px 20px; font-family:'DM Mono',monospace; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,.35); align-items:center; gap:8px; transition:transform .15s; }
.fab-cart:active { transform:scale(.96); }
.fab-badge { background:#fff; color:var(--accent); border-radius:10px; padding:1px 7px; font-size:11px; font-weight:700; }

.cart-overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.6); backdrop-filter:blur(2px); }
.cart-overlay.open { display:block; }
.cart-drawer { position:fixed; bottom:0; left:0; right:0; z-index:301; background:var(--cart-bg); border-top:2px solid var(--accent); border-radius:16px 16px 0 0; max-height:55vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); }
.cart-drawer.open { transform:translateY(0); }

/* ── BARRE DE NAVIGATION VERTICALE ── */
.scroll-bar {
  position:fixed; right:calc(300px + 4px); top:52px; bottom:0;
  width:28px; z-index:150;
  display:flex; flex-direction:column; align-items:center;
  justify-content:space-between; padding:8px 0;
  pointer-events:none;
}
.scroll-btn {
  width:28px; height:28px; border-radius:50%;
  background:var(--accent); color:#fff;
  border:none; cursor:pointer; font-size:14px; line-height:1;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  pointer-events:all; transition:background .15s, transform .1s;
  flex-shrink:0;
}
.scroll-btn:hover { background:var(--accent2); transform:scale(1.1); }
.scroll-track {
  flex:1; width:4px; background:var(--border);
  border-radius:2px; margin:6px 0; position:relative; pointer-events:all; cursor:pointer;
}
.scroll-thumb {
  width:4px; border-radius:2px;
  background:var(--accent2); position:absolute; left:0; top:0;
  transition:top .1s; min-height:20px;
}
@media (max-width:1023px) { .scroll-bar { display:none; } }
.drawer-handle { width:36px; height:4px; border-radius:2px; background:#c8b8e8; margin:10px auto 4px; flex-shrink:0; }

@media (max-width:1023px) {
  header { padding:12px 16px; } .logo { font-size:11px; } .header-sub { display:none; }
  .layout { grid-template-columns:1fr; height:calc(100vh - 46px); }
  .cart-panel { display:none; } .fab-cart { display:flex; }
  .grid-panel { padding:12px 8px 80px; }
  .grid-title { font-size:10px; letter-spacing:.08em; margin-bottom:10px; }
  table { font-size:11px; }
  thead th { padding:7px 5px; font-size:9px; letter-spacing:.04em; }
  thead th:first-child { min-width:80px; }
  td.model-cell { padding:6px 8px; }
  .cell-btn { height:40px; } .ch { font-size:9px; padding:1px 3px; } .pill { font-size:10px; padding:2px 6px; }
  .popover { position:fixed !important; top:50% !important; left:50% !important; transform:translate(-50%,-50%) !important; width:270px; min-width:unset; z-index:400; }
}

table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { background:var(--surface); border:1px solid var(--border); padding:10px 12px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.08em; color:var(--accent); text-align:center; position:sticky; top:0; z-index:10; }
thead th:first-child { text-align:left; min-width:100px; }
tbody tr:hover { background:rgba(90,58,138,.04); }
td { border:1px solid var(--border); padding:0; vertical-align:middle; }
td.model-cell { padding:8px 14px; white-space:nowrap; }

td.qty-cell { text-align:center; position:relative; }
td.disabled-cell { background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.04) 4px,rgba(0,0,0,.04) 8px); cursor:not-allowed; }

.cell-btn { width:100%; height:48px; background:transparent; border:none; cursor:pointer; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; transition:background .15s; display:flex; align-items:center; justify-content:center; gap:4px; padding:0; }
.cell-btn:hover { background:rgba(90,58,138,.07); }
.cell-btn.has-qty { background:rgba(90,58,138,.07); }
.cell-dash { color:var(--muted); font-size:13px; transition:opacity .12s; }
.cell-btn:hover .cell-dash { opacity:0; }
.cond-hints { display:flex; gap:4px; align-items:center; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); opacity:0; transition:opacity .12s; pointer-events:none; }
.cell-btn:hover .cond-hints { opacity:1; }
.cell-btn.has-qty .cond-hints, .cell-btn.has-qty:hover .cond-hints { opacity:0 !important; }
.ch { font-family:'DM Mono',monospace; font-size:10px; color:#bbb5a8; background:rgba(0,0,0,.04); border:1px solid #ddd6c8; border-radius:3px; padding:2px 5px; line-height:1.4; }
.cell-btn:hover .ch { color:var(--muted); border-color:#c0b8a8; }
.cell-btn.has-qty .cell-dash { opacity:0; }
.pill { background:var(--accent); color:#fff; border-radius:10px; padding:2px 10px; font-size:11px; font-weight:700; font-family:'DM Mono',monospace; }
.edit-hint { font-size:9px; color:var(--accent2); letter-spacing:.05em; position:absolute; bottom:4px; left:0; right:0; text-align:center; opacity:0; transition:opacity .12s; font-family:'DM Mono',monospace; }
.cell-btn.has-qty:hover .edit-hint { opacity:1; }

.popover { display:none; position:fixed; z-index:500; background:var(--surface); border:1px solid var(--accent); border-radius:6px; padding:14px; min-width:210px; box-shadow:0 8px 24px rgba(0,0,0,.15); }
.popover.open { display:block; }
.popover-title { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.qty-row { display:flex; gap:6px; margin-bottom:8px; align-items:center; }
.qty-label { font-size:12px; color:var(--muted); width:60px; flex-shrink:0; }
.qty-ctrl { display:flex; align-items:center; gap:6px; }
.qty-ctrl button { width:26px; height:26px; border-radius:4px; background:var(--border); border:none; color:var(--text); cursor:pointer; font-size:15px; line-height:1; transition:background .1s; }
.qty-ctrl button:hover { background:var(--accent); color:#fff; }
.qty-ctrl span { font-family:'DM Mono',monospace; font-size:13px; min-width:20px; text-align:center; }
.popover-add { width:100%; margin-top:6px; background:var(--accent); color:#fff; border:none; border-radius:4px; padding:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .15s; }
.popover-add:hover { opacity:.85; }

.cond-tabs { display:flex; gap:4px; margin-bottom:10px; }
.cond-tab { flex:1; padding:6px 4px; background:var(--border); border:none; border-radius:3px; color:var(--muted); font-size:11px; cursor:pointer; font-family:'DM Mono',monospace; transition:all .1s; }
.cond-tab.active { background:var(--accent2); color:#fff; }

/* CART */
.cart-panel { background:var(--cart-bg); border-left:1px solid var(--border); display:flex; flex-direction:column; }
.cart-header { padding:16px 20px; border-bottom:1px solid #d4c8ec; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent2); display:flex; justify-content:space-between; align-items:center; }
.cart-count { background:var(--accent); color:#fff; border-radius:10px; padding:2px 8px; font-size:10px; font-weight:700; }
.cart-items { flex:1; overflow-y:auto; padding:12px; }
.cart-empty { color:#8a7aaa; font-size:12px; text-align:center; margin-top:40px; line-height:1.8; }
.cart-item { background:#ffffff; border:1px solid #ddd0f0; border-radius:4px; padding:10px 12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.cart-item-info { flex:1; }
.cart-item-name { font-size:12px; font-weight:500; margin-bottom:3px; color:#2a1a45; }
.cart-item-detail { font-size:11px; color:#8a7aaa; font-family:'DM Mono',monospace; }
.cart-item-price { font-family:'DM Mono',monospace; font-size:12px; color:var(--accent2); white-space:nowrap; }
.cart-item-del { background:none; border:none; color:#b0a0c8; cursor:pointer; font-size:14px; line-height:1; padding:0 2px; transition:color .1s; }
.cart-item-del:hover { color:#ff6b6b; }
.cart-footer { border-top:1px solid #d4c8ec; padding:16px 20px; }
.cart-total-row { display:flex; justify-content:space-between; margin-bottom:14px; }
.cart-total-label { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#8a7aaa; }
.cart-total-val { font-family:'DM Mono',monospace; font-size:18px; color:var(--accent2); font-weight:500; }
.btn-valider { width:100%; background:var(--accent); color:#fff; border:none; border-radius:4px; padding:14px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:800; cursor:pointer; letter-spacing:.08em; text-transform:uppercase; transition:opacity .15s; }
.btn-valider:hover { opacity:.85; }
.btn-valider:disabled { opacity:.3; cursor:not-allowed; }

/* MODAL FICHE */
.modal-overlay { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.55); backdrop-filter:blur(3px); align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:var(--surface); border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.25); max-width:380px; width:92%; overflow:hidden; animation:modalIn .2s ease; position:relative; }
@keyframes modalIn { from{transform:scale(.92);opacity:0} to{transform:scale(1);opacity:1} }
.modal-img { width:100%; background:#cceeff; display:flex; align-items:center; justify-content:center; padding:20px 0; min-height:130px; }
.modal-img img { max-height:100px; object-fit:contain; }
.modal-body { padding:18px 22px 22px; }
.modal-model { font-family:'DM Mono',monospace; font-weight:700; font-size:20px; color:var(--accent); margin-bottom:4px; }
.modal-usage { font-size:13px; color:var(--muted); font-style:italic; margin-bottom:10px; line-height:1.5; }
.modal-desc { font-size:13px; color:var(--text); line-height:1.7; margin-bottom:14px; }
.modal-tags { display:flex; flex-wrap:wrap; gap:6px; }
.modal-tag { background:rgba(90,58,138,.08); color:var(--accent); border:1px solid rgba(90,58,138,.2); border-radius:20px; padding:3px 10px; font-size:11px; font-family:'DM Mono',monospace; }
.modal-close { position:absolute; top:10px; right:14px; background:none; border:none; font-size:22px; color:var(--muted); cursor:pointer; line-height:1; z-index:1; }
.modal-close:hover { color:var(--text); }

/* Bouton info sur le nom du modele */
.info-btn { display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer; padding:0; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--text); transition:color .15s; }
.info-btn:hover { color:var(--accent); }
.info-icon { width:15px; height:15px; border-radius:50%; background:var(--accent); color:#fff; font-size:9px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .15s; }
.info-btn:hover .info-icon { transform:scale(1.2); }
.model-name { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--text); }

</style>
</head>
<body>

<header>
  <div class="logo">Kamasan — Commande hameçons</div>
  <div class="header-sub">Survolez · Cliquez pour commander</div>
</header>

<div class="layout">
  <div class="grid-panel">
    <div class="grid-title">Survolez une case pour voir les conditionnements · Cliquez pour commander</div>
    <table id="mainTable">
      <thead><tr id="theadRow"></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="cart-panel">
    <div class="cart-header"><span>Panier</span><span class="cart-count" id="cartCount">0</span></div>
    <div class="cart-items" id="cartItems"><div class="cart-empty">Votre panier est vide.<br>Cliquez sur la grille<br>pour commander.</div></div>
    <div class="cart-footer">
      <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="cartTotal">0,00 &euro;</span></div>
      <button class="btn-valider" id="btnValider" disabled onclick="valider()">Valider la commande</button>
    </div>
  </div>
</div>

<button class="fab-cart" id="fabCart" onclick="openDrawer()">&#128722; Panier <span class="fab-badge" id="fabBadge">0</span></button>

<div class="cart-overlay" id="cartOverlay" onclick="closeDrawer()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-handle"></div>
  <div class="cart-header" style="border-radius:0">
    <span>Panier</span>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="cart-count" id="drawerCount">0</span>
      <button onclick="closeDrawer()" style="background:none;border:none;color:#8a7aaa;font-size:18px;cursor:pointer;line-height:1">&#x2715;</button>
    </div>
  </div>
  <div class="cart-items" id="drawerItems" style="flex:1;overflow-y:auto;padding:12px"><div class="cart-empty">Panier vide.</div></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span class="cart-total-label">Total</span><span class="cart-total-val" id="drawerTotal">0,00 &euro;</span></div>
    <button class="btn-valider" id="drawerValider" disabled onclick="valider()">Valider la commande</button>
  </div>
</div>


<div class="popover" id="popover">
  <div class="popover-title" id="popTitle">Conditionnement</div>
  <div class="cond-tabs">
    <button class="cond-tab" onclick="setCond(0)" id="tab0">x10</button>
    <button class="cond-tab" onclick="setCond(1)" id="tab1">x25</button>
    <button class="cond-tab" onclick="setCond(2)" id="tab2">x100</button>
  </div>
  <div class="qty-row">
    <span class="qty-label">Sachets</span>
    <div class="qty-ctrl">
      <button onclick="changeQty(-1)">&#8722;</button>
      <span id="popQty">0</span>
      <button onclick="changeQty(1)">+</button>
    </div>
  </div>
</div>

<!-- MODAL FICHE MODELE -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModalFn()">&#x2715;</button>
    <div class="modal-img" id="modalImg"></div>
    <div class="modal-body">
      <div class="modal-model" id="modalModel"></div>
      <div class="modal-usage" id="modalUsage"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-tags" id="modalTags"></div>
    </div>
  </div>
</div>

const ALL_TAILLES = [...new Set(MODELES.flatMap(function(m){ return m.tailles; }))]
  .sort(function(a,b){ return parseInt(a)-parseInt(b); });

function getCondsForModele(mid) {
  var m = MODELES.find(function(x){ return x.id===mid; });
  return [
    {qty:10,  prix:m.prix[0], label:'x10'},
    {qty:25,  prix:m.prix[1], label:'x25'},
    {qty:100, prix:m.prix[2], label:'x100'}
  ];
}

var cart = [];
var activeCell = null;
var popCond = null;
var popQty = 0;

// En-têtes
var theadRow = document.getElementById('theadRow');
var thHTML = '<th>Modele</th>';
ALL_TAILLES.forEach(function(t){ thHTML += '<th>N&deg;'+t+'</th>'; });
theadRow.innerHTML = thHTML;

// Lignes
var tbody = document.getElementById('tableBody');
MODELES.forEach(function(m) {
  var tr = document.createElement('tr');
  var tdLabel = document.createElement('td');
  tdLabel.className = 'model-cell';
  var hasFiche = FICHES.hasOwnProperty(m.id);
  if (hasFiche) {
    tdLabel.innerHTML = '<button class="info-btn" onclick="openModalFn(\''+m.id+'\')"><span class="info-icon">i</span><span>'+m.label+'</span></button>';
  } else {
    tdLabel.innerHTML = '<span class="model-name">'+m.label+'</span>';
  }
  tr.appendChild(tdLabel);

  ALL_TAILLES.forEach(function(t) {
    var td = document.createElement('td');
    var dispo = m.tailles.indexOf(t) !== -1;
    if (!dispo) {
      td.className = 'qty-cell disabled-cell';
    } else {
      td.className = 'qty-cell';
      td.dataset.modele = m.id;
      td.dataset.taille = t;
      td.innerHTML = '<button class="cell-btn" onclick="openPop(event,\''+m.id+'\',\''+t+'\',\''+m.label+'\',this.closest(\'td\'))"><span class="cell-dash">&#8212;</span><span class="cond-hints"><span class="ch">10</span><span class="ch">25</span><span class="ch">100</span></span></button>';
    }
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
});

function openPop(e, modele, taille, mlabel, td) {
  e.stopPropagation();
  var pop = document.getElementById('popover');
  if (activeCell && activeCell.td === td && pop.classList.contains('open')) {
    pop.classList.remove('open'); activeCell = null; return;
  }
  activeCell = {modele:modele, taille:taille, mlabel:mlabel, td:td};
  var conds = getCondsForModele(modele);
  for (var i=0;i<3;i++) {
    var tab = document.getElementById('tab'+i);
    tab.innerHTML = conds[i].label+'<br><small>'+conds[i].prix.toFixed(2).replace('.',',')+'&euro;</small>';
    tab.classList.remove('active');
  }
  // Recharger la commande existante
  var existingItems = cart.filter(function(i){ return i.modele===modele && i.taille===taille; });
  if (existingItems.length > 0) {
    var ref = existingItems[0];
    popCond = ref.cond === conds[0] ? 0 : ref.cond === conds[1] ? 1 : 2;
    // Retrouver l'index du conditionnement
    for (var ci=0; ci<3; ci++) { if (conds[ci].qty === ref.cond.qty) { popCond = ci; break; } }
    popQty = existingItems.reduce(function(s,i){ return s+i.sachets; }, 0);
    document.getElementById('tab'+popCond).classList.add('active');
  } else {
    popCond = null; popQty = 0;
  }
  document.getElementById('popQty').textContent = popQty;
  document.getElementById('popTitle').textContent = mlabel+' N'+String.fromCharCode(176)+taille;
  var rect = td.getBoundingClientRect();
  var popH = 180; // hauteur estimée du popover
  var spaceBelow = window.innerHeight - rect.bottom;
  if (spaceBelow < popH) {
    pop.style.top  = (rect.top - popH - 4)+'px';
  } else {
    pop.style.top  = (rect.bottom+4)+'px';
  }
  pop.style.left = (rect.left+rect.width/2)+'px';
  pop.style.transform = 'translateX(-50%)';
  pop.classList.add('open');
  closeDrawer();
}

function setCond(i) {
  popCond = i;
  for(var j=0;j<3;j++) document.getElementById('tab'+j).classList.toggle('active',j===i);
  if (popQty > 0) syncCart();
}
function changeQty(d) {
  var newQty = popQty + d;
  if (newQty < 0) return;
  if (newQty > 0 && popCond === null) return;
  popQty = newQty;
  document.getElementById('popQty').textContent = popQty;
  syncCart();
}
function updatePopover() {
  for(var i=0;i<3;i++) document.getElementById('tab'+i).classList.toggle('active',i===popCond);
  document.getElementById('popQty').textContent=popQty;
}

function syncCart() {
  if (!activeCell) return;
  var modele=activeCell.modele, taille=activeCell.taille, mlabel=activeCell.mlabel, td=activeCell.td;
  var cond = popCond !== null ? getCondsForModele(modele)[popCond] : null;
  // Supprimer toutes les lignes existantes pour cette cellule
  cart = cart.filter(function(i){ return !(i.modele===modele && i.taille===taille); });
  if (popCond !== null && popQty > 0) {
    var key = modele+'-'+taille+'-'+popCond;
    cart.push({key:key, modele:modele, mlabel:mlabel, taille:taille, cond:cond, sachets:popQty});
  }
  updateCellBtn(td, modele, taille);
  renderCart();
  if (popQty === 0) {
    document.getElementById('popover').classList.remove('open');
    activeCell = null; popCond = null; popQty = 0;
  }
  notifyCart();
}
function addToCart() { syncCart(); }

function updateCellBtn(td, modele, taille) {
  var total = cart.filter(function(i){ return i.modele===modele&&i.taille===taille; }).reduce(function(s,i){ return s+i.sachets*i.cond.qty; },0);
  var btn = td.querySelector('.cell-btn');
  if (total > 0) {
    btn.classList.add('has-qty');
    btn.innerHTML = '<span class="pill">'+total+'</span><span class="edit-hint">modifier</span>';
  } else {
    btn.classList.remove('has-qty');
    btn.innerHTML = '<span class="cell-dash">&#8212;</span><span class="cond-hints"><span class="ch">10</span><span class="ch">25</span><span class="ch">100</span></span>';
  }
}

function removeItem(key) {
  var item = cart.find(function(i){ return i.key===key; });
  if (!item) return;
  cart = cart.filter(function(i){ return i.key!==key; });
  var td = document.querySelector('td[data-modele="'+item.modele+'"][data-taille="'+item.taille+'"]');
  if (td) updateCellBtn(td, item.modele, item.taille);
  renderCart();
  notifyCart();
}

function renderCart() {
  var el=document.getElementById('cartItems'), countEl=document.getElementById('cartCount');
  var totalEl=document.getElementById('cartTotal'), btn=document.getElementById('btnValider');
  var dEl=document.getElementById('drawerItems'), dCount=document.getElementById('drawerCount');
  var dTotal=document.getElementById('drawerTotal'), dBtn=document.getElementById('drawerValider');
  var fab=document.getElementById('fabBadge');
  if (!cart.length) {
    var empty='<div class="cart-empty">Panier vide.<br>Cliquez sur la grille<br>pour commander.</div>';
    el.innerHTML=empty; dEl.innerHTML=empty;
    countEl.textContent='0'; dCount.textContent='0'; fab.textContent='0';
    totalEl.textContent='0,00 €'; dTotal.textContent='0,00 €';
    btn.disabled=true; dBtn.disabled=true; return;
  }
  var total=0;
  var html=cart.map(function(i){
    var prix=i.sachets*i.cond.prix; total+=prix;
    return '<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">'+i.mlabel+' · N°'+i.taille+'</div><div class="cart-item-detail">'+i.sachets+'× '+i.cond.label+' ('+i.sachets*i.cond.qty+' hameçons)</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="cart-item-price">'+prix.toFixed(2)+' €</div><button class="cart-item-del" onclick="removeItem(\'' +i.key+ '\')">&#x2715;</button></div></div>';
  }).join('');
  var ts=total.toFixed(2).replace('.',',')+' €';
  el.innerHTML=html; dEl.innerHTML=html;
  countEl.textContent=cart.length; dCount.textContent=cart.length; fab.textContent=cart.length;
  totalEl.textContent=ts; dTotal.textContent=ts;
  btn.disabled=false; dBtn.disabled=false;
}

function openDrawer()  { document.getElementById('cartOverlay').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); }
function closeDrawer() { document.getElementById('cartOverlay').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); }

document.addEventListener('click', function(e) {
  var pop=document.getElementById('popover');
  var mo=document.getElementById('modalOverlay');
  if (!pop.contains(e.target) && !e.target.closest('.cell-btn')) { pop.classList.remove('open'); activeCell=null; }
  if (e.target===mo) mo.classList.remove('open');
});
document.getElementById('popover').addEventListener('mouseleave', function() { if (window.innerWidth > 700) closePop(); });

function openModalFn(modelId) {
  var fiche = FICHES[modelId];
  if (!fiche) return;
  var m = MODELES.find(function(x){ return x.id===modelId; });
  document.getElementById('modalModel').textContent = m ? m.label : modelId;
  document.getElementById('modalUsage').textContent = fiche.usage;
  document.getElementById('modalDesc').textContent  = fiche.desc;
  var tagsEl = document.getElementById('modalTags');
  tagsEl.innerHTML = fiche.tags.map(function(t){ return '<span class="modal-tag">'+t+'</span>'; }).join('');
  var imgEl = document.getElementById('modalImg');
  imgEl.innerHTML = fiche.photo ? '<img src="'+fiche.photo+'" alt="'+modelId+'">' : '<span style="color:#aaa;font-size:12px">Pas de photo</span>';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModalFn() { document.getElementById('modalOverlay').classList.remove('open'); }


// ── BARRE DE SCROLL ──
document.addEventListener('DOMContentLoaded', function() {
(function() {
  var panel = document.querySelector('.grid-panel');
  var thumb = document.getElementById('scrollThumb');
  var track = document.getElementById('scrollTrack');
  if (!panel || !thumb || !track) return;

  function updateThumb() {
    var ratio = panel.scrollTop / (panel.scrollHeight - panel.clientHeight || 1);
    var trackH = track.clientHeight;
    var thumbH = Math.max(20, (panel.clientHeight / panel.scrollHeight) * trackH);
    thumb.style.height = thumbH + 'px';
    thumb.style.top = (ratio * (trackH - thumbH)) + 'px';
  }

  panel.addEventListener('scroll', updateThumb);
  window.addEventListener('resize', updateThumb);
  updateThumb();

  document.getElementById('scrollUp').addEventListener('click', function() {
    panel.scrollBy({top: -120, behavior:'smooth'});
  });
  document.getElementById('scrollDown').addEventListener('click', function() {
    panel.scrollBy({top: 120, behavior:'smooth'});
  });

  // Clic sur la piste pour positionner
  track.addEventListener('click', function(e) {
    var tRect = track.getBoundingClientRect();
    var ratio = (e.clientY - tRect.top) / tRect.height;
    panel.scrollTop = ratio * (panel.scrollHeight - panel.clientHeight);
  });
})();
}); // DOMContentLoaded



// Fermer le popover sur tap extérieur (mobile)
document.addEventListener('touchend', function(e) {
  var pop = document.getElementById('popover');
  if (pop.classList.contains('open') && !pop.contains(e.target) && !e.target.closest('.cell-btn')) {
    closePop();
  }
}, {passive: true});


function notifyCart() {
  // Sur mobile, replier le tiroir après ajout pour libérer la grille
  if (window.innerWidth < 1024) {
    closeDrawer();
    // Faire clignoter le badge FAB pour signaler l'ajout
    var fab = document.getElementById('fabBadge');
    if (fab) {
      fab.style.transition = 'transform .2s';
      fab.style.transform = 'scale(1.6)';
      setTimeout(function(){ fab.style.transform = 'scale(1)'; }, 300);
    }
  }
}

function closePop() {
  document.getElementById('popover').classList.remove('open');
  activeCell = null;
}

function valider() { alert('Commande validée — ' + document.getElementById('cartTotal').textContent); }
